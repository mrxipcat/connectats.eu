// ── Setup canvas ──────────────────────────────────────────────────────────
const cvs = document.getElementById('logo-canvas');

// Proporcions del logo original: ~900 wide, ~340 tall (corbes ~180px + text ~160px)
const DESIGN_W = 900, DESIGN_H = 428;
function resize() {
  const w = Math.min(640, cvs.parentElement.clientWidth);
  cvs.width  = w * devicePixelRatio;
  cvs.height = (DESIGN_H / DESIGN_W * w) * devicePixelRatio;
  cvs.style.width  = w + 'px';
  cvs.style.height = (DESIGN_H / DESIGN_W * w) + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); });

const ctx = cvs.getContext('2d');

// ── Mapeig coordenades SVG → canvas ──────────────────────────────────────
// El SVG original: corbes x=[30,542] y=[108,194], viewBox 900x380
const SVG_X0=30, SVG_X1=542, SVG_Y0=100, SVG_Y1=200;

function sx(x) {
  const s = cvs.width / (DESIGN_W * devicePixelRatio);
  return (x - SVG_X0) / (SVG_X1 - SVG_X0) * cvs.width * 0.92 + cvs.width * 0.04;
}
function sy(y) {
  const zoneH = cvs.height * 0.355; // les corbes ocupen el 35.5% superior
  return cvs.height * 0.03 + (y - SVG_Y0) / (SVG_Y1 - SVG_Y0) * zoneH;
}
function sw(w) {
  return w * (cvs.width / (DESIGN_W * devicePixelRatio)) * devicePixelRatio * 1.1;
}

// ── Utilitats ─────────────────────────────────────────────────────────────
function ease(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }
function cl(v,a,b) { return Math.max(a, Math.min(b, v)); }
function nm(v,a,b) { return cl((v-a)/(b-a),0,1); }

function bezierPt(d, t) {
  const [x1,y1,cx1,cy1,cx2,cy2,x2,y2] = d;
  const u=1-t;
  return [u*u*u*x1+3*u*u*t*cx1+3*u*t*t*cx2+t*t*t*x2,
          u*u*u*y1+3*u*u*t*cy1+3*u*t*t*cy2+t*t*t*y2];
}

// ── Dibuix d'una partícula ────────────────────────────────────────────────

  const total = data.length;
  const endIdx = frac * total;
  const full = Math.floor(endIdx);
  const part = endIdx - full;

    const d = data[i];

    ctx.bezierCurveTo(sx(d[2]),sy(d[3]), sx(d[4]),sy(d[5]), sx(d[6]),sy(d[7]));
    ctx.strokeStyle = color;
    ctx.globalAlpha = d[9] * fadeIn;
    ctx.lineWidth = sw(d[8]);
    ctx.lineCap = 'round';
    ctx.stroke();

  // Segment parcial actual
  let ex, ey;
  if (full < total && part > 0) {
    const d = data[full];
    const [px,py] = bezierPt(d, part);
    ex=px; ey=py;
    // Subdivisió de De Casteljau fins a 't'
    const [mx,my]   = bezierPt(d, part*0.5);
    const [mx2,my2] = bezierPt(d, part*0.8);
    ctx.beginPath();
    ctx.moveTo(sx(d[0]), sy(d[1]));
    ctx.bezierCurveTo(sx(mx),sy(my), sx(mx2),sy(my2), sx(ex),sy(ey));
    ctx.strokeStyle = color;
    ctx.globalAlpha = d[9];
    ctx.lineWidth = sw(d[8]);
    ctx.lineCap = 'round';
    ctx.stroke();
  } else if (full >= total) {
    ex = data[total-1][6];
    ey = data[total-1][7];
  }

  // Partícula pulsant al capdavant
  if (ex !== undefined) {
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.007);
    const r = sw(4.5) + pulse * sw(1.2);
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(sx(ex), sy(ey), r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx(ex), sy(ey), r*1.8 + pulse*sw(1.5), 0, Math.PI*2);
    ctx.strokeStyle = color;
    ctx.lineWidth = sw(1.2);
    ctx.globalAlpha = 0.28 + pulse*0.2;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ── Animació principal ────────────────────────────────────────────────────
const DUR       = 5000;  // 5 segons
const DRAW_END  = 0.65;  // les corbes acaben de dibuixar-se al 65%
const T1_START  = 0.28;  // "Connectats" comença a aparèixer
const T1_END    = 0.70;
const T2_START  = 0.62;  // "DIGITALMENT SEGURS" comença
const T2_END    = 0.88;
const CONTACT_T = 4600;  // ms quan apareix el paràgraf de contacte

let start = null;
let contactShown = false;

function render(ts) {
  if (!start) start = ts;
  const elapsed = ts - start;
  const progress = cl(elapsed / DUR, 0, 1);

  // Mostrem el paràgraf de contacte prop del final
  if (elapsed >= CONTACT_T && !contactShown) {
    document.getElementById('contact').classList.add('visible');
    contactShown = true;
  }

  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // Escalar el context per devicePixelRatio per a cada frame
  // (ja s'ha aplicat al resize, no cal tornar a escalar aquí)

  // ─ Corbes ─
  const fracB = ease(nm(progress, 0,           DRAW_END));
  const fracG = ease(nm(progress, 0.05, DRAW_END + 0.04));
  drawParticle(BD, '#5BB3F0', fracB, ts);
  ctx.globalAlpha = 1;
  drawParticle(GD, '#5BF05B', fracG, ts);
  ctx.globalAlpha = 1;

  // ─ Text "Connectats" ─
  const a1    = ease(nm(progress, T1_START, T1_END));
  const rise1 = (1 - ease(nm(progress, T1_START, T1_START + 0.20))) * cvs.height * 0.05;
  const textY = cvs.height * 0.672;
  const fontSize1 = cvs.width * 0.166;

  ctx.globalAlpha = a1;
  ctx.font = `100 ${fontSize1}px "Skia", "Gill Sans", sans-serif`;
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.save();
  ctx.translate(cvs.width/2, textY + rise1);
  ctx.scale(0.88, 1.0);
  ctx.fillText('Connectats', 0, 0);
  ctx.restore();

  // ─ Subtítol "DIGITALMENT SEGURS" ─
  const a2    = ease(nm(progress, T2_START, T2_END));
  const rise2 = (1 - ease(nm(progress, T2_START, T2_START + 0.15))) * cvs.height * 0.03;
  const fontSize2 = cvs.width * 0.050;
  const letterSp  = cvs.width * 0.0035;

  ctx.globalAlpha = a2;
  ctx.font = `200 ${fontSize2}px "Skia", "Gill Sans", sans-serif`;
  ctx.fillStyle = '#555';

  // Letter-spacing natiu + escala per lletres més altes i primes
  const sub = 'DIGITALMENT SEGURS';
  ctx.letterSpacing = letterSp + 'px';
  ctx.textAlign = 'center';

  const subX = cvs.width/2;
  const subY = textY + rise1 + fontSize2*0.910 + rise2 + 40;
  const scaleX = 0.8;  // lleugerament condensat (mesurat de la imatge)
  const scaleY = 1.0;   // sense estirament vertical

  ctx.save();
  ctx.translate(subX, subY);
  ctx.scale(scaleX, scaleY);
  ctx.fillText(sub, 0, 0);
  ctx.restore();
  ctx.letterSpacing = '0px';

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // Bucle: en acabar, espera 2s i recomença (sense tornar a mostrar el contacte)
  if (progress < 1) {
    requestAnimationFrame(render);
  } else {
    setTimeout(() => {
      start = null;
      requestAnimationFrame(render);
    }, 2000);
  }
}

requestAnimationFrame(render);
</script>

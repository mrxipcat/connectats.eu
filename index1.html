<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connectats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Quicksand", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #1a1a1a;
    text-align: center;
    padding: 2rem;
  }

  .container {
    max-width: 700px;
  }

  .logo {
    width: 100%;
    max-width: 640px;
    height: auto;
    margin-bottom: 2.5rem;
  }

  p {
    font-family: "Quicksand", sans-serif;
    font-weight: 500;
    font-size: 1.1rem;
    color: #333333;
    line-height: 1.6;
  }

  a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px solid rgba(59, 130, 246, 0.4);
    transition: border-color 0.2s ease;
  }

  a:hover {
    border-color: #3b82f6;
  }
</style>
</head>
<body>
  <div class="container">
    <img src="logo.jpg" alt="Connectats - Digitalment Segurs" class="logo">
    <p>Per contactar amb nosaltres, escriu-nos a <a href="mailto:info@connectats.eu">info@connectats.eu</a></p>
  </div>
</body>
</html>
